name: Daily Newspaper Collection

on:
  schedule:
    - cron: "0 8 * * 1-5"
      timezone: "Asia/Seoul"

  workflow_dispatch:
    inputs:
      target_date:
        description: "수집 날짜 YYYYMMDD. 비워두면 한국시간 오늘 날짜 사용"
        required: false
        default: ""

jobs:
  collect-validate-enrich-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Decide target date
        id: date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "target_date=${{ github.event.inputs.target_date }}" >> $GITHUB_OUTPUT
          else
            echo "target_date=$(TZ=Asia/Seoul date +%Y%m%d)" >> $GITHUB_OUTPUT
          fi

      - name: Collect newspaper data
        run: |
          python collect_news.py ${{ steps.date.outputs.target_date }}

      - name: Validate collected data
        run: |
          python validate_news.py ${{ steps.date.outputs.target_date }}

      - name: Enrich article contents
        run: |
          python enrich_content.py ${{ steps.date.outputs.target_date }}

      - name: Send result email
        env:
          SMTP_HOST: smtp.naver.com
          SMTP_PORT: 465
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
        run: |
          python send_email.py ${{ steps.date.outputs.target_date }}

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newspaper-output-${{ steps.date.outputs.target_date }}
          path: output/${{ steps.date.outputs.target_date }}
